<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | HeavyDeals</title>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a192f; --orange: #f97316; --white: #ffffff; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a192f 0%, #1a3650 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }
        .admin-icon {
            width: 60px;
            height: 60px;
            background: var(--orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .admin-icon i { font-size: 1.8rem; color: white; }
        .input-modern {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
        }
        .input-modern:focus {
            outline: none;
            border-color: var(--orange);
        }
        .btn-admin {
            width: 100%;
            padding: 12px;
            background: var(--orange);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
        }
        .btn-admin:hover { background: #ea580c; }
    </style>
</head>
<body>
    <div class="admin-login-card">
        <div class="admin-icon"><i class="fas fa-user-shield"></i></div>
        <h3 class="text-center mb-3">Admin Login</h3>
        {% if msg %}
        <div class="alert alert-danger py-2">{{ msg }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" class="input-modern mb-3" placeholder="Username" required>
            <input type="password" name="password" class="input-modern mb-3" placeholder="Password" required>
            <button type="submit" class="btn-admin">Login</button>
        </form>
    </div>
</body>
</html>
