<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HeavyDeals | Choose Your Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --orange: #f97316;
            --orange-dark: #ea580c;
            --white: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .role-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 2.5rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--navy), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .tagline {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--navy);
        }
        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
        }
        .role-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .role-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.8rem;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .role-btn-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .role-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .role-info h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
        }
        .role-info p {
            font-size: 0.75rem;
            margin: 0;
            opacity: 0.8;
        }
        .btn-buyer {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--white);
        }
        .btn-buyer .role-icon {
            background: rgba(255, 255, 255, 0.15);
            color: var(--white);
        }
        .btn-buyer:hover {
            transform: translateX(8px);
        }
        .btn-seller {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: var(--white);
        }
        .btn-seller .role-icon {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }
        .btn-seller:hover {
            transform: translateX(8px);
        }
        .divider {
            text-align: center;
            position: relative;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: var(--white);
            padding: 0 12px;
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .stats-section {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--orange);
        }
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        @media (max-width: 480px) {
            .role-card { padding: 1.8rem; border-radius: 32px; }
            .logo-text { font-size: 1.5rem; }
            .title { font-size: 1.3rem; }
            .role-btn { padding: 0.9rem 1.2rem; }
            .role-icon { width: 40px; height: 40px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="role-card">
        <div class="logo-wrapper">
            <div class="logo-icon">
                <img src="/static/logo.png" alt="HeavyDeals Logo">
            </div>
            <h1 class="logo-text">Heavy Deals</h1>
            <p class="tagline">E-commerce Review Mediator</p>
        </div>
        <div class="title-section">
            <h2 class="title">Welcome!</h2>
            <p class="subtitle">Select your role to continue to your dashboard</p>
        </div>
        <div class="role-buttons">
            <a href="/buyer/auth" class="role-btn btn-buyer">
                <div class="role-btn-left">
                    <div class="role-icon"><i class="fas fa-shopping-cart"></i></div>
                    <div class="role-info">
                        <h4>I am a Buyer</h4>
                        <p>Place orders & earn rewards</p>
                    </div>
                </div>
                <div class="role-arrow"><i class="fas fa-arrow-right"></i></div>
            </a>
            <a href="/seller/login" class="role-btn btn-seller">
                <div class="role-btn-left">
                    <div class="role-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="role-info">
                        <h4>I am a Seller</h4>
                        <p>Manage products & reviews</p>
                    </div>
                </div>
                <div class="role-arrow"><i class="fas fa-arrow-right"></i></div>
            </a>
        </div>
        <div class="divider"><span>How it works</span></div>
        <div class="stats-section">
            <div class="stat-item"><div class="stat-number">200+</div><div class="stat-label">Share Product</div></div>
            <div class="stat-item"><div class="stat-number">1000+</div><div class="stat-label">Order & Review</div></div>
            <div class="stat-item"><div class="stat-number">750+</div><div class="stat-label">Get Paid</div></div>
        </div>
        <div class="footer-note">
            <i class="fas fa-shield-alt me-1"></i> Secure Mediation Platform
            <span class="mx-1">•</span>
            <i class="fas fa-clock me-1"></i> Fast Settlements
        </div>
    </div>
    <script>
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const href = this.getAttribute('href');
                this.style.opacity = '0.7';
                this.style.transform = 'scale(0.98)';
                setTimeout(() => { window.location.href = href; }, 150);
            });
        });
    </script>
</body>
</html>
