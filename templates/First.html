<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            margin: 0;
            background: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        .title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 25px;
            color: #777;
        }

        .btn-custom {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-buyer {
            background: #0d6efd;
            color: #fff;
        }

        .btn-seller {
            background: #198754;
            color: #fff;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
    </style>
</head>

<body>

    <div class="card-box"> <h2 class="title">Welcome</h2> <p class="subtitle">Select your role to continue</p> <a href="/buyer/login" class="btn btn-custom btn-buyer"> I am Buyer </a> <a href="/seller/login" class="btn btn-custom btn-seller"> I am Seller </a> </div>

</body>

</html>
