<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Buyer Portal | HeavyDeals</title>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --orange: #f97316;
            --orange-dark: #ea580c;
            --orange-light: #ffedd5;
            --white: #ffffff;
            --gray: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--navy), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .tagline { font-size: 0.75rem; color: #64748b; text-align: center; margin-top: 0.25rem; }
        .tabs-modern {
            display: flex;
            gap: 0.5rem;
            background: var(--gray);
            padding: 0.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            border: none;
            padding: 0.8rem 1rem;
            background: transparent;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #64748b;
        }
        .tab-btn i { margin-right: 8px; }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--white);
            box-shadow: 0 4px 12px rgba(10, 25, 47, 0.2);
        }
        .form-container { display: block; }
        .form-container.hidden { display: none; }
        .input-group-modern {
            position: relative;
            margin-bottom: 1.2rem;
        }
        .input-group-modern i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 2;
        }
        .input-modern {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: var(--white);
        }
        .input-modern:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }
        .btn-gradient {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
        }
        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .alert-modern {
            background: var(--orange-light);
            border-radius: 60px;
            padding: 12px 18px;
            color: var(--orange-dark);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
        }
        .divider {
            text-align: center;
            position: relative;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: var(--white);
            padding: 0 12px;
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: var(--white);
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--navy);
            transition: all 0.3s;
        }
        .google-btn:hover {
            background: var(--gray);
            border-color: var(--orange);
            transform: translateY(-2px);
        }
        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
        }
        .footer-links a { color: var(--orange); text-decoration: none; font-weight: 500; }
        .otp-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }
        .resend-btn {
            background: none;
            border: none;
            color: var(--orange);
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .resend-btn:hover { text-decoration: underline; }
        .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .countdown {
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
            margin-top: 5px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fa-spinner { animation: spin 1s linear infinite; }
        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; border-radius: 32px; }
            .logo-icon { width: 55px; height: 55px; }
            .logo-text { font-size: 1.5rem; }
            .tab-btn { padding: 0.6rem 0.8rem; font-size: 0.85rem; }
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="logo-wrapper">
            <div class="logo-icon"><img src="/static/logo.png" alt="HeavyDeals"></div>
            <h1 class="logo-text">Heavy Deals</h1>
            <p class="tagline">Buyer Portal • Earn Rewards</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <div class="tabs-modern">
            <button class="tab-btn active" id="loginTabBtn" onclick="switchTab('login')"><i class="fas fa-sign-in-alt"></i> Login</button>
            <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')"><i class="fas fa-user-plus"></i> Register</button>
        </div>
        
        <!-- Login Form -->
        <form method="POST" id="loginForm" class="form-container">
            <input type="hidden" name="action" value="login">
            <div class="input-group-modern">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="loginEmail" class="input-modern" placeholder="Email Address" required>
            </div>
            <div class="input-group-modern">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="loginPassword" class="input-modern" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-gradient"><i class="fas fa-arrow-right-to-bracket"></i> Login to Account</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="form-container">
            <input type="hidden" name="action" value="register">
            <div class="input-group-modern">
                <i class="fas fa-user"></i>
                <input type="text" name="name" id="regName" class="input-modern" placeholder="Full Name" required>
            </div>
            <div class="input-group-modern">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="regEmail" class="input-modern" placeholder="Email Address" required>
            </div>
            <div class="input-group-modern">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" name="number" id="regMobile" class="input-modern" placeholder="Mobile Number (10 digits)" required pattern="[0-9]{10}">
            </div>
            <div class="input-group-modern">
                <i class="fas fa-rupee-sign"></i>
                <input type="text" name="upi_id" id="regUpiId" class="input-modern" placeholder="UPI ID (e.g., name@okhdfcbank)" required>
            </div>
            <div class="input-group-modern">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="regPassword" class="input-modern" placeholder="Password" required>
            </div>
            <div class="input-group-modern">
                <i class="fas fa-lock"></i>
                <input type="password" name="confirm_password" id="regConfirmPassword" class="input-modern" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn-gradient" id="sendOtpBtn"><i class="fas fa-paper-plane"></i> Send OTP</button>
        </form>
        
        <!-- OTP Form - Initially Hidden -->
        <div id="otpContainer" style="display: none;">
            <form id="otpForm">
                <input type="hidden" name="action" value="verify_otp">
                <input type="hidden" name="email" id="otpEmail">
                <div class="input-group-modern">
                    <i class="fas fa-key"></i>
                    <input type="text" name="otp" id="otpCode" class="input-modern" placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>
                <button type="submit" class="btn-gradient" id="verifyOtpBtn"><i class="fas fa-check-circle"></i> Verify & Register</button>
                
                <div class="otp-section">
                    <div id="countdownTimer" class="countdown"></div>
                    <button type="button" class="resend-btn" id="resendOtpBtn" onclick="resendOTP()" style="display: none;"><i class="fas fa-redo-alt"></i> Resend OTP</button>
                </div>
            </form>
        </div>
        
        <div class="divider"><span>or continue with</span></div>
        <a href="/buyer/google/login" class="google-btn"><i class="fab fa-google"></i> Sign in with Google</a>
        <div class="footer-links"><a href="/">← Back to Home</a></div>
    </div>
    
    <script>
        let countdownInterval;
        let currentEmail = "";
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const otpContainer = document.getElementById('otpContainer');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            
            loginForm.classList.add('hidden');
            registerForm.classList.add('hidden');
            otpContainer.style.display = 'none';
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else if (tab === 'register') {
                registerForm.classList.remove('hidden');
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert-modern ${type === 'error' ? 'alert-error' : ''}">
                    <i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}
                </div>
            `;
            
            setTimeout(() => {
                const alertDiv = alertContainer.querySelector('.alert-modern');
                if (alertDiv) {
                    alertDiv.style.opacity = '0';
                    setTimeout(() => alertDiv.remove(), 300);
                }
            }, 10000);
        }
        
        function startCountdown(seconds) {
            let remaining = seconds;
            const timerElement = document.getElementById('countdownTimer');
            const resendBtn = document.getElementById('resendOtpBtn');
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    timerElement.innerHTML = '';
                    resendBtn.style.display = 'inline-block';
                    resendBtn.disabled = false;
                } else {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerElement.innerHTML = `⏰ Resend OTP in ${mins}:${secs.toString().padStart(2, '0')}`;
                    remaining--;
                }
            }, 1000);
        }
        
        function resendOTP() {
            if (!currentEmail) return;
            
            const resendBtn = document.getElementById('resendOtpBtn');
            resendBtn.disabled = true;
            resendBtn.style.opacity = '0.5';
            
            fetch('/buyer/resend-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('OTP resent successfully!', 'success');
                    startCountdown(60);
                } else {
                    showAlert(data.message, 'error');
                    resendBtn.disabled = false;
                    resendBtn.style.opacity = '1';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Failed to resend OTP', 'error');
                resendBtn.disabled = false;
                resendBtn.style.opacity = '1';
            });
        }
        
        function isValidEmail(email) {
            return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
        }
        
        // Handle Register Form Submit (AJAX)
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const mobile = document.getElementById('regMobile').value;
            const upiId = document.getElementById('regUpiId').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Validation
            if (!name || !email || !mobile || !upiId || !password) {
                showAlert('Please fill all fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }
            
            if (!/^\d{10}$/.test(mobile)) {
                showAlert('Please enter a valid 10-digit mobile number', 'error');
                return;
            }
            
            if (!upiId.includes('@')) {
                showAlert('Please enter a valid UPI ID (e.g., name@okhdfcbank)', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            // Disable Send OTP button
            const sendOtpBtn = document.getElementById('sendOtpBtn');
            sendOtpBtn.disabled = true;
            sendOtpBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
            
            // Send AJAX request
            fetch('/buyer/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: 'register',
                    name: name,
                    email: email,
                    number: mobile,
                    upi_id: upiId,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // OTP sent successfully - show OTP form
                    currentEmail = data.email;
                    document.getElementById('otpEmail').value = data.email;
                    document.getElementById('otpContainer').style.display = 'block';
                    document.getElementById('registerForm').classList.add('hidden');
                    startCountdown(300);
                    showAlert('OTP sent to your email! Please check your inbox.', 'success');
                } else {
                    // Error occurred
                    if (data.error === 'email_exists') {
                        showAlert(data.message, 'error');
                    } else {
                        showAlert(data.message, 'error');
                    }
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Something went wrong. Please try again.', 'error');
                sendOtpBtn.disabled = false;
                sendOtpBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
            });
        });
        
        // Handle OTP Form Submit
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('otpEmail').value;
            const otp = document.getElementById('otpCode').value;
            
            if (!otp || otp.length !== 6) {
                showAlert('Please enter a valid 6-digit OTP', 'error');
                return;
            }
            
            const verifyBtn = document.getElementById('verifyOtpBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            
            fetch('/buyer/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: 'verify_otp',
                    email: email,
                    otp: otp
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('Registration successful! Redirecting...', 'success');
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    }
                } else {
                    showAlert(data.message, 'error');
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Register';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Something went wrong', 'error');
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Register';
            });
        });
        
        // Handle Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) {
                e.preventDefault();
                showAlert('Please fill all fields', 'error');
                return;
            }
            if (!isValidEmail(email)) {
                e.preventDefault();
                showAlert('Please enter a valid email address', 'error');
                return;
            }
        });
        
        // Initialize - show login form
        switchTab('login');
    </script>
</body>

</html>
