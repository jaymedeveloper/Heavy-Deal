<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Complete Profile | HeavyDeals</title>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a192f; --navy-light: #112240; --orange: #f97316; --orange-dark: #ea580c; --orange-light: #ffedd5; --white: #ffffff; --gray: #f8fafc; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .profile-card {
            background: var(--white);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        .logo-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--navy), var(--orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .tagline { font-size: 0.75rem; color: #64748b; text-align: center; margin-top: 0.25rem; }
        .info-box {
            background: #e0f2fe;
            border-left: 4px solid var(--orange);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .input-group-modern {
            position: relative;
            margin-bottom: 1.2rem;
        }
        .input-group-modern i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            z-index: 2;
        }
        .input-modern {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: var(--white);
        }
        .input-modern:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }
        .btn-gradient {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4); }
        .alert-modern {
            background: var(--orange-light);
            border-radius: 60px;
            padding: 12px 18px;
            color: var(--orange-dark);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 480px) {
            .profile-card { padding: 1.5rem; border-radius: 32px; }
            .logo-icon { width: 55px; height: 55px; }
            .logo-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="logo-icon"><img src="/static/logo.png" alt="HeavyDeals"></div>
    <h1 class="logo-text">Complete Profile</h1>
    <p class="tagline">Set up your account details</p>
    
    <div class="info-box">
        <i class="fas fa-info-circle me-2" style="color: var(--orange);"></i>
        <small>Please set your name, mobile number, UPI ID (to receive refunds), and password.</small>
    </div>
    
    {% if msg %}
    <div class="alert-modern"><i class="fas fa-info-circle me-2"></i>{{ msg }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="input-group-modern">
            <i class="fas fa-user"></i>
            <input type="text" name="name" class="input-modern" placeholder="Amazon Profile Name" value="{{ current_name }}" required>
        </div>
        
        <div class="input-group-modern">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" name="mobile" class="input-modern" placeholder="Mobile Number (10 digits)" value="{{ current_mobile }}" required>
        </div>
        
        <div class="input-group-modern">
            <i class="fas fa-rupee-sign"></i>
            <input type="text" name="upi_id" class="input-modern" placeholder="UPI ID (e.g., name@okhdfcbank)" value="{{ current_upi }}" required>
        </div>
        
        <div class="input-group-modern">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="input-modern" placeholder="Password" required>
        </div>
        
        <div class="input-group-modern">
            <i class="fas fa-lock"></i>
            <input type="password" name="confirm_password" class="input-modern" placeholder="Confirm Password" required>
        </div>
        
        <button type="submit" class="btn-gradient"><i class="fas fa-save me-2"></i>Save & Continue</button>
    </form>
</div>
</body>
</html>
