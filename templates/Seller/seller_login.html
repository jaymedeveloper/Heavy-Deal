<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login | HeavyDeals</title>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a192f; --navy-light: #112240; --orange: #f97316; --orange-dark: #ea580c; --orange-light: #ffedd5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .login-card { background: var(--white); border-radius: 32px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        .login-card:hover { transform: translateY(-5px); }
        .logo-circle { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: 0 10px 25px rgba(249,115,22,0.3); }
        .logo-circle img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }
        .login-title { font-size: 1.8rem; font-weight: 800; color: var(--navy); text-align: center; margin-bottom: 0.25rem; }
        .login-subtitle { color: #64748b; font-size: 0.85rem; text-align: center; }
        .input-group-modern { position: relative; margin-bottom: 1.2rem; }
        .input-group-modern i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 2; }
        .input-modern { width: 100%; padding: 14px 18px 14px 48px; border: 2px solid #e2e8f0; border-radius: 60px; font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: all 0.2s; background: var(--white); }
        .input-modern:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
        .btn-login { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 60px; color: white; font-weight: 700; font-size: 1rem; transition: all 0.3s; margin-top: 0.5rem; cursor: pointer; }
        .btn-login:hover { background: var(--orange-dark); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(249,115,22,0.4); }
        .alert-modern { background: var(--orange-light); border-radius: 60px; padding: 10px 18px; color: var(--orange-dark); font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; }
        .extra-links { text-align: center; margin-top: 1.8rem; }
        .extra-links a { text-decoration: none; color: var(--orange); font-weight: 500; font-size: 0.9rem; }
        .extra-links a:hover { color: var(--orange-dark); text-decoration: underline; }
        .divider { margin: 1.5rem 0 1rem; text-align: center; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 45%; height: 1px; background: #e2e8f0; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span { background: var(--white); padding: 0 10px; color: #94a3b8; font-size: 0.8rem; }
        @media (max-width: 480px) { .login-card { padding: 1.8rem; } .login-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-wrapper">
        <div class="logo-circle"><img src="/static/logo.png" alt="HeavyDeals"></div>
        <h1 class="login-title">HeavyDeals Seller</h1>
        <p class="login-subtitle">Sign in to manage your store</p>
    </div>
    {% if msg %}<div class="alert-modern"><i class="fas fa-exclamation-triangle me-2"></i>{{ msg }}</div>{% endif %}
    <form method="POST" action="/seller/login">
        <div class="input-group-modern"><i class="fas fa-user"></i><input type="text" name="username" class="input-modern" placeholder="Username" required></div>
        <div class="input-group-modern"><i class="fas fa-lock"></i><input type="password" name="password" class="input-modern" placeholder="Password" required></div>
        <button type="submit" class="btn-login"><i class="fas fa-arrow-right-to-bracket me-2"></i>Login</button>
    </form>
    <div class="divider"><span>New here?</span></div>
    <div class="extra-links"><p class="mb-2"><a href="/seller/register"><i class="fas fa-user-plus me-1"></i>Create an account</a></p><p><a href="/"><i class="fas fa-home me-1"></i>Back to Home</a></p></div>
</div>
</body>
</html>
