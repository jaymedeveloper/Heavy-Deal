<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login</title>

 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        height: 100vh;
        margin: 0;
        background: #eef2f7;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
    }

    .login-box:hover {
        transform: translateY(-3px);
    }

    .title {
        text-align: center;
        font-weight: 600;
        margin-bottom: 25px;
        color: #1e293b;
    }

    .form-control {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 15px;
        border: 1px solid #d1d5db;
        transition: 0.2s;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: #2563eb;
        border: none;
        color: #fff;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-login:hover {
        background: #1e40af;
        transform: translateY(-1px);
    }

    .extra-links {
        text-align: center;
        margin-top: 15px;
    }

    .extra-links a {
        text-decoration: none;
        color: #2563eb;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }

    .alert {
        margin-bottom: 15px;
    }
</style>
 

</head>

<body>

 
<div class="login-box">

    <h4 class="title">Seller Login</h4>

    {% if msg %}
    <div class="alert alert-danger text-center py-2">
        {{ msg }}
    </div>
    {% endif %}

    <form method="POST" action="/seller/login">
        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>

        <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="extra-links">
        <p class="mt-2">Don't have an account? <a href="/seller/register">Register</a></p>
        <p><a href="/">⬅ Back to Home</a></p>
    </div>

</div>
 

</body>

</html>
