<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #eef1f7;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #1e293b;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #3b82f6;
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            height: 100vh;
            background: #111827;
            position: fixed;
            top: 60px;
            left: 0;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: #cbd5e1;
            font-size: 14px;
        }

        .sidebar a:hover {
            background: #1f2937;
            color: #fff;
        }

        .icon {
            font-size: 16px;
        }

        /* Main */
        .main {
            margin-left: 250px;
            padding: 25px;
        }

        .card-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-4px);
        }

        .card-title {
            font-size: 13px;
            color: #6b7280;
        }

        .card-value {
            font-size: 26px;
            font-weight: bold;
            margin-top: 5px;
            color: #111827;
        }

        @media (max-width: 768px) {

            .card-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                /* 2 columns */
                gap: 12px;
            }

            .card-box {
                padding: 15px;
            }

            .card-value {
                font-size: 20px;
            }


            .sidebar {
                position: fixed;
                bottom: 0;
                top: auto;
                width: 100%;
                height: 60px;
                display: flex;
                justify-content: space-around;
                align-items: center;
                padding: 0;
                z-index: 1000;
            }

            .sidebar a {
                flex-direction: column;
                font-size: 12px;
                margin: 0;
            }

            .main {
                margin-left: 0;
                padding-bottom: 70px;
            }
        }

        /* Loader Full Screen */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            top: 0;
            left: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Animation */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Hide Animation */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>


</head>

<body>
    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <div class="navbar">
        <h5>Seller Panel</h5>

        <div class="dropdown">
            <a class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" href="#"
                data-bs-toggle="dropdown">

                <span>{{ seller_name }}</span>

                <div class="avatar ms-2">
                    {{ seller_name[0] }}
                </div>
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/seller/profile">Profile</a></li>
                <li><a class="dropdown-item" href="/seller/settings">Settings</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item text-danger" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>

    <!-- Sidebar / Bottom Nav -->
    <div class="sidebar">
        <a href="/seller/dashboard" onclick="showLoader()">
            <span class="icon">🏠</span>
            <span>Dashboard</span>
        </a>
        <a href="/seller/orders" onclick="showLoader()">
            <span class="icon">📦</span>
            <span>Orders</span>
        </a>
        <a href="/seller/refunds" onclick="showLoader()">
            <span class="icon">💸</span>
            <span>Refunds</span>
        </a>
        <a href="/seller/products" onclick="showLoader()">
            <span class="icon">🛍️</span>
            <span>Products</span>
        </a>
    </div>

    <!-- Main -->
    <div class="main">

        <h4>Dashboard Overview</h4>

        <div class="row g-3 card-grid">

            <div class="col-md-3">
                <div class="card-box">
                    <div class="card-title">Total Orders</div>
                    <div class="card-value">{{ total_orders }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <div class="card-title">Approved Orders</div>
                    <div class="card-value">{{ approved_orders }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <div class="card-title">Pending Orders</div>
                    <div class="card-value">{{ pending_orders }}</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <div class="card-title">Total Amount</div>
                    <div class="card-value">₹ {{ total_amount }}</div>
                </div>
            </div>

        </div>

    </div>
    <script>
        function showLoader() {
            let loader = document.getElementById("loader");
            if (loader) {
                loader.style.display = "flex";
            }
        }

        /* Page load */
        window.addEventListener("load", function () {
            let loader = document.getElementById("loader");
            if (loader) loader.style.display = "none";
        });

        /* Back / forward button fix */
        window.addEventListener("pageshow", function (event) {
            let loader = document.getElementById("loader");
            if (loader) loader.style.display = "none";

            // important: bfcache detect
            if (event.persisted) {
                loader.style.display = "none";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
