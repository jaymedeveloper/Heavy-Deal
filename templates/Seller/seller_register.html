<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/static/title_logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration | HeavyDeals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a192f; --navy-light: #112240; --orange: #f97316; --orange-dark: #ea580c; --orange-light: #ffedd5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .register-card { background: var(--white); border-radius: 32px; padding: 2rem; width: 100%; max-width: 550px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
        h1 { font-size: 1.6rem; font-weight: 800; color: var(--navy); text-align: center; }
        .input-modern { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .input-modern:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
        .btn-register { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; transition: all 0.3s; }
        .btn-register:hover { background: var(--orange-dark); transform: translateY(-2px); }
        .alert-modern { background: var(--orange-light); border-radius: 12px; padding: 12px; color: var(--orange-dark); text-align: center; margin-bottom: 1.5rem; }
        .required:after { content: " *"; color: red; }
        @media (max-width: 480px) { .register-card { padding: 1.5rem; } h1 { font-size: 1.3rem; } }
    </style>
</head>
<body>
<div class="register-card">
    <div class="logo-icon"><img src="/static/logo.png" alt="HeavyDeals"></div>
    <h1>Seller Registration</h1>
    <p class="text-muted text-center mb-4">Join HeavyDeals as a seller</p>
    {% if msg %}<div class="alert-modern"><i class="fas fa-info-circle me-2"></i>{{ msg }}</div>{% endif %}
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label required">Full Name</label><input type="text" name="name" class="input-modern" required></div>
            <div class="col-md-6"><label class="form-label required">Username</label><input type="text" name="username" class="input-modern" required></div>
            <div class="col-md-6"><label class="form-label required">Email</label><input type="email" name="email" class="input-modern" required></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" name="phone" class="input-modern"></div>
            <div class="col-md-6"><label class="form-label required">Password</label><input type="password" name="password" class="input-modern" required></div>
            <div class="col-md-6"><label class="form-label required">Confirm Password</label><input type="password" name="confirm_password" class="input-modern" required></div>
        </div>
        <button type="submit" class="btn-register mt-4"><i class="fas fa-user-plus me-2"></i>Register</button>
    </form>
    <div class="text-center mt-4"><a href="/seller/login" style="color: var(--orange);">Already have an account? Login</a><br><a href="/" class="text-muted small">← Back to Home</a></div>
</div>
</body>
</html>
