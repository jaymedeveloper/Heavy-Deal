<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Pending | HeavyDeals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0a192f; --orange: #f97316; --orange-light: #ffedd5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, #112240 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .pending-card { background: var(--white); border-radius: 32px; padding: 2.5rem; text-align: center; max-width: 500px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--orange-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon-circle img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 10px;
        }
        h2 { color: var(--navy); font-weight: 700; margin-bottom: 1rem; }
        .btn-home { display: inline-block; padding: 12px 30px; background: var(--orange); color: white; text-decoration: none; border-radius: 40px; font-weight: 600; margin-top: 1.5rem; transition: all 0.3s; }
        .btn-home:hover { background: #ea580c; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="pending-card">
    <div class="icon-circle"><img src="/static/logo.png" alt="HeavyDeals"></div>
    <h2>Registration Submitted!</h2>
    <p class="text-muted">Thank you for registering as a seller with HeavyDeals.</p>
    <div class="alert alert-warning bg-light mt-3 p-3 rounded-3"><i class="fas fa-shield-alt me-2"></i> Your account is pending admin approval. You will receive an email once approved.</div>
    <p class="small text-muted mt-3">Approval usually takes 24-48 hours.</p>
    <a href="/" class="btn-home"><i class="fas fa-home me-2"></i>Back to Home</a>
</div>
</body>
</html>
